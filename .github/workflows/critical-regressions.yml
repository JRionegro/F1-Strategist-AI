name: Critical Regressions

"on":
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  timing-regressions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run critical timing regressions
        run: |
          python -m pytest -q \
            tests/test_simulation_controller_qatar_regression.py \
            tests/test_simulation_time_alignment.py
